<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups">
  <title>Ouvroir — Community Poetry</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&family=Cormorant+Garamond:ital,wght@0,400..700;1,400..700&family=Public+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="ouvroir/ouvroir.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    html, body, #root { height: 100%; margin: 0; }
    body { background: #f0eee9; color: #29261b; font-family: "Public Sans", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    
    /* Layout styling similar to app */
    .poems-page {
      display: flex;
      flex-direction: column;
      height: 100vh;
      box-sizing: border-box;
    }
    .poems-header {
      background: var(--paper);
      border-bottom: 1px solid var(--rule);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .poems-title {
      font-family: "EB Garamond", serif;
      font-size: 28px;
      font-weight: 500;
      margin: 0;
    }
    .poems-content {
      flex: 1;
      overflow-y: auto;
      padding: 32px 24px;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      box-sizing: border-box;
    }
    .tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 8px;
    }
    .tab-btn {
      background: none;
      border: none;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      color: var(--mute);
      padding: 6px 12px;
      cursor: pointer;
      border-radius: 4px;
    }
    .tab-btn.active {
      color: var(--ink);
      background: var(--field);
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .poem-card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }
    .poem-pre {
      font-family: "EB Garamond", serif;
      font-size: 15px;
      line-height: 1.5;
      background: var(--field);
      border-left: 2px solid var(--accent);
      padding: 12px;
      border-radius: 4px;
      margin: 12px 0;
      max-height: 240px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    .star-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--field);
      border: 1px solid var(--rule);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      color: var(--mute);
      transition: all 0.15s;
    }
    .star-badge.on {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(217, 119, 87, 0.05);
    }
    .star-badge:hover {
      background: var(--rule);
    }
  </style>
</head>
<body class="theme-press">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    function parseJwt(token) {
      try {
        return JSON.parse(atob(token.split('.')[1]));
      } catch (e) {
        return null;
      }
    }

    function PoemsApp() {
      const [poems, setPoems] = useState([]);
      const [loading, setLoading] = useState(true);
      const [tab, setTab] = useState('all'); // 'all' or 'favorites'
      const [searchQuery, setSearchQuery] = useState('');
      
      const [token, setToken] = useState(() => localStorage.getItem('google_id_token') || null);
      const [firstName, setFirstName] = useState(() => localStorage.getItem('user_first_name') || null);

      const handleSignOut = () => {
        localStorage.removeItem('google_id_token');
        localStorage.removeItem('user_first_name');
        setToken(null);
        setFirstName(null);
        window.location.reload();
      };

      useEffect(() => {
        const initGoogleButton = () => {
          if (typeof google === 'undefined') {
            setTimeout(initGoogleButton, 250);
            return;
          }

          window.handleCredentialResponse = (response) => {
            localStorage.setItem('google_id_token', response.credential);
            const user = parseJwt(response.credential);
            localStorage.setItem('user_first_name', user.given_name);
            window.location.reload();
          };

          google.accounts.id.initialize({
            client_id: "956217831164-hvtajjcljt7nc50h012fml987k1tsip7.apps.googleusercontent.com",
            callback: window.handleCredentialResponse
          });

          const btn = document.getElementById("google_signin_button");
          if (btn) {
            google.accounts.id.renderButton(btn, { theme: "outline", size: "medium", text: "signin_with" });
          }
        };

        if (!token) {
          initGoogleButton();
        }
      }, [token]);

      const fetchPoems = useCallback(async () => {
        if (!token) {
          setLoading(false);
          return;
        }
        try {
          const res = await fetch('http://localhost:3000/api/poems/all', {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          if (res.status === 401 || res.status === 403) {
            handleSignOut();
            return;
          }
          if (res.ok) {
            const data = await res.json();
            setPoems(data);
          }
        } catch (err) {
          console.error('Error fetching poems:', err);
        } finally {
          setLoading(false);
        }
      }, [token]);

      useEffect(() => {
        fetchPoems();
      }, [fetchPoems]);

      const toggleStarPoem = async (poemId) => {
        if (!token) return;
        try {
          const res = await fetch(`http://localhost:3000/api/poems/${poemId}/star`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` }
          });
          if (res.status === 401 || res.status === 403) {
            handleSignOut();
            return;
          }
          if (res.ok) {
            const data = await res.json();
            // Optimistically update star count and status locally
            setPoems(prev => prev.map(p => {
              if (p.id === poemId) {
                return {
                  ...p,
                  starred: data.starred,
                  starCount: data.starred ? p.starCount + 1 : Math.max(0, p.starCount - 1)
                };
              }
              return p;
            }));
          }
        } catch (err) {
          console.error('Error toggling star:', err);
        }
      };

      const filteredPoems = poems.filter(p => {
        if (tab === 'favorites' && !p.starred) return false;
        
        const needle = searchQuery.toLowerCase().trim();
        if (!needle) return true;

        const matchText = p.text.toLowerCase().includes(needle);
        const matchTitle = p.title.toLowerCase().includes(needle);
        const matchAuthor = (p.author || '').toLowerCase().includes(needle);
        const matchConstraints = (p.constraints || []).some(c => 
          (c.title || c.name || '').toLowerCase().includes(needle) || 
          (c.description || c.blurb || '').toLowerCase().includes(needle)
        );
        return matchText || matchTitle || matchAuthor || matchConstraints;
      });

      const favoriteCount = poems.filter(p => p.starred).length;

      return (
        <div className="poems-page">
          <header className="poems-header">
            <div style={{ display: 'flex', alignItems: 'baseline', gap: '16px' }}>
              <h1 className="poems-title">Ouvroir</h1>
              <span style={{ color: 'var(--mute)', fontSize: '14px', fontStyle: 'italic' }}>Community Poetry</span>
            </div>
            
            <div style={{ display: 'flex', alignItems: 'center', gap: '16px' }}>
              <a href="index.html" className="ouv-btn ouv-btn-secondary" style={{ fontSize: '13px', textDecoration: 'none' }}>
                Open Editor
              </a>

              {token ? (
                <div style={{ display: 'flex', alignItems: 'center', gap: '8px', fontSize: '13px' }}>
                  <span>Hi {firstName}!</span>
                  <button onClick={handleSignOut} className="ouv-btn ouv-btn-ghost" style={{ fontSize: '11px', padding: '2px 6px' }}>
                    Sign Out
                  </button>
                </div>
              ) : (
                <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
                  <div id="google_signin_button"></div>
                  <input 
                    type="text" 
                    placeholder="Guest username..." 
                    className="ouv-input"
                    style={{ fontSize: '11px', padding: '4px 6px' }}
                    onKeyDown={(e) => {
                      if (e.key === 'Enter' && e.target.value.trim()) {
                        const handle = e.target.value.trim();
                        localStorage.setItem('google_id_token', 'guest:' + handle);
                        localStorage.setItem('user_first_name', handle);
                        window.location.reload();
                      }
                    }}
                  />
                </div>
              )}
            </div>
          </header>

          <main className="poems-content">
            {!token ? (
              <div style={{ padding: '64px', textAlign: 'center', fontStyle: 'italic', color: 'var(--mute)', background: 'var(--paper)', borderRadius: '4px', border: '1px solid var(--rule)' }}>
                Please sign in with Google or enter a Guest username to view the community poetry list and favorites.
              </div>
            ) : (
              <>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: '16px', marginBottom: '24px' }}>
                  <div className="tabs">
                    <button 
                      className={`tab-btn ${tab === 'all' ? 'active' : ''}`}
                      onClick={() => setTab('all')}
                    >
                      All Poetry ({poems.length})
                    </button>
                    <button 
                      className={`tab-btn ${tab === 'favorites' ? 'active' : ''}`}
                      onClick={() => setTab('favorites')}
                    >
                      My Favorites ({favoriteCount})
                    </button>
                  </div>
                  
                  <input
                    type="text"
                    className="ouv-input"
                    placeholder="Search titles, authors, text, or constraints..."
                    value={searchQuery}
                    onChange={e => setSearchQuery(e.target.value)}
                    style={{ maxWidth: '360px', fontSize: '13px' }}
                  />
                </div>

                {loading ? (
                  <div style={{ textAlign: 'center', padding: '48px', color: 'var(--mute)', fontStyle: 'italic' }}>
                    Loading shared poetry collection...
                  </div>
                ) : filteredPoems.length === 0 ? (
                  <div style={{ textAlign: 'center', padding: '48px', color: 'var(--mute)', fontStyle: 'italic' }}>
                    {searchQuery ? 'No poems match your search.' : tab === 'favorites' ? 'You have no favorited poems yet.' : 'No poetry has been saved yet.'}
                  </div>
                ) : (
                  <div className="poem-card-grid">
                    {filteredPoems.map(p => (
                      <div key={p.id} className="ouv-cf-card" style={{ display: 'flex', flexDirection: 'column', padding: '20px', cursor: 'default' }}>
                        <div className="ouv-cf-head" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                          <div>
                            <div className="ouv-cf-name" style={{ fontSize: '18px', fontWeight: 500 }}>{p.title}</div>
                            {p.author && <div style={{ fontSize: '11px', color: 'var(--accent)', fontFamily: 'var(--mono)', marginTop: '2px' }}>@{p.author}</div>}
                          </div>
                          <button 
                            className={`star-badge ${p.starred ? 'on' : ''}`}
                            onClick={() => toggleStarPoem(p.id)}
                            title={p.starred ? 'Remove favorite' : 'Add favorite'}
                          >
                            ★ {p.starCount || 0}
                          </button>
                        </div>

                        <pre className="poem-pre">{p.text}</pre>

                        {p.constraints && p.constraints.length > 0 && (
                          <div style={{ marginTop: 'auto', paddingTop: '12px' }}>
                            <div style={{ fontSize: '10px', textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--mute)', marginBottom: '6px', fontWeight: 600 }}>
                              Constraints:
                            </div>
                            <div style={{ display: 'flex', flexWrap: 'wrap', gap: '4px' }}>
                              {p.constraints.map((c, idx) => (
                                <span 
                                  key={idx} 
                                  style={{ 
                                    fontSize: '10px', 
                                    background: 'var(--field)', 
                                    border: '1px solid var(--rule)',
                                    padding: '2px 6px',
                                    borderRadius: '3px',
                                    color: 'var(--ink)'
                                  }}
                                  title={c.description || c.blurb}
                                >
                                  {c.title || c.name || 'Custom'}
                                </span>
                              ))}
                            </div>
                          </div>
                        )}

                        <div style={{ marginTop: '16px', paddingTop: '10px', borderTop: '1px dashed var(--rule)', display: 'flex', justifyContent: 'flex-end' }}>
                          <a 
                            href={`index.html#load-${p.id}`} 
                            className="ouv-btn ouv-btn-secondary" 
                            style={{ fontSize: '11px', textDecoration: 'none', padding: '4px 10px' }}
                          >
                            Open in Editor →
                          </a>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PoemsApp />);
  </script>
</body>
</html>
